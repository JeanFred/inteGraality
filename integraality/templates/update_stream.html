{% extends "base.html" %}
{% block content %}
<h3>Updating <a href="{{ page_url }}">{{ page_title }}</a></h3>
<div id="progress"></div>
<div id="result" style="display:none"></div>
<script>
(function() {
    var pageUrl = {{ page_url|tojson }};
    var pageTitle = {{ page_title|tojson }};
    var qleverUiUrl = {{ qlever_ui_url|tojson }};
    var sparqlPrefixes = {{ sparql_prefixes|tojson }};
    var progress = document.getElementById("progress");
    var result = document.getElementById("result");
    var streamUrl = "/update/stream?url=" + encodeURIComponent(pageUrl) + "&page=" + encodeURIComponent(pageTitle);
    var source;

    function escapeHtml(text) {
        var div = document.createElement("div");
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function addPrefixes(query) {
        return sparqlPrefixes + query;
    }

    function startStream() {
        progress.innerHTML = "";
        result.style.display = "none";
        result.className = "";
        result.innerHTML = "";
        source = new EventSource(streamUrl);
        source.onmessage = onMessage;
        source.onerror = onError;
    }

    function onMessage(e) {
        var data = JSON.parse(e.data);
        if (data.status === "progress") {
            var icon = data.phase === "end" ? "✅" : "⏳";
            progress.innerHTML += "<p>" + icon + " " + escapeHtml(data.message) + "</p>";
        } else if (data.status === "done") {
            var elapsed = parseFloat(data.result).toFixed(2);
            result.style.display = "block";
            result.className = "alert alert-success";
            result.innerHTML = "<p>✅ Updated page <a href=\"" + escapeHtml(pageUrl) + "\">" + escapeHtml(pageTitle) + "</a> (in " + elapsed + "s)</p>";
            source.close();
        } else if (data.status === "error") {
            showError(data);
            source.close();
        }
    }

    function onError() {
        result.style.display = "block";
        result.className = "alert alert-danger";
        result.innerHTML = "<p>❌ Connection lost.</p>" + retryButton();
        source.close();
    }

    function retryButton() {
        return "<button class=\"btn btn-primary\" onclick=\"window.__retryStream()\">🔄 Retry</button>";
    }

    window.__retryStream = startStream;

    function showError(data) {
        result.style.display = "block";
        var category = data.error_category || "bug";

        if (category === "query") {
            result.className = "alert alert-danger";
            var query = data.query || "";
            result.innerHTML =
                "<p>The following SPARQL query timed out or returned no result:</p>" +
                "<pre><code>" + escapeHtml(query) + "</code></pre>" +
                "<p>" +
                "<a class=\"btn btn-primary\" href=\"https://query.wikidata.org/#" + encodeURIComponent(query) + "\">Try it in Wikidata Query Service</a> " +
                "<a class=\"btn btn-info\" href=\"" + escapeHtml(qleverUiUrl) + "?query=" + encodeURIComponent(addPrefixes(query)) + "\">Try it in QLever</a>" +
                "</p>";
        } else if (category === "transient") {
            result.className = "alert alert-warning";
            result.innerHTML =
                "<p>A temporary server issue occurred. This is usually caused by high server load and is not a bug.</p>" +
                "<p>" + escapeHtml(data.message) + "</p>" +
                "<p>Please try again later.</p>" +
                retryButton();
        } else if (category === "config") {
            result.className = "alert alert-danger";
            result.innerHTML =
                "<p>Please check your configuration.</p>" +
                "<p>" + escapeHtml(data.message) + "</p>";
        } else {
            result.className = "alert alert-danger";
            var tb = (data.traceback || []).join("");
            var phabUrl = "https://phabricator.wikimedia.org/maniphest/task/create/?projects=tool-integraality&description=" + encodeURIComponent("```\n" + tb + "```");
            result.innerHTML =
                "<p>Something catastrophic happened. This is very likely a bug in inteGraality itself, not a configuration issue.</p>" +
                "<p><a class=\"btn btn-warning\" href=\"" + phabUrl + "\">Report this on Phabricator</a></p>" +
                "<pre>" + escapeHtml(tb) + "</pre>";
        }
    }

    startStream();
})();
</script>
{% endblock %}
