{% extends "base.html" %}
{% block content %}
<h3>Updating <a href="{{ page_url }}">{{ page_title }}</a></h3>
<div id="progress"></div>
<div id="result" style="display:none"></div>
<script>
(function() {
    var pageUrl = {{ page_url|tojson }};
    var pageTitle = {{ page_title|tojson }};
    var progress = document.getElementById("progress");
    var result = document.getElementById("result");
    var streamUrl = "/update/stream?url=" + encodeURIComponent(pageUrl) + "&page=" + encodeURIComponent(pageTitle);
    var source = new EventSource(streamUrl);

    function escapeHtml(text) {
        var div = document.createElement("div");
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function onMessage(e) {
        var data = JSON.parse(e.data);
        if (data.status === "progress") {
            var icon = data.phase === "end" ? "✅" : "⏳";
            progress.innerHTML += "<p>" + icon + " " + escapeHtml(data.message) + "</p>";
        } else if (data.status === "done") {
            var elapsed = parseFloat(data.result).toFixed(2);
            result.style.display = "block";
            result.className = "alert alert-success";
            result.innerHTML = "<p>✅ Updated page <a href=\"" + escapeHtml(pageUrl) + "\">" + escapeHtml(pageTitle) + "</a> (in " + elapsed + "s)</p>";
            source.close();
        } else if (data.status === "error") {
            result.style.display = "block";
            result.className = "alert alert-danger";
            result.innerHTML = "<p>❌ Error: " + escapeHtml(data.message) + "</p>";
            source.close();
        }
    }

    function onError() {
        result.style.display = "block";
        result.className = "alert alert-danger";
        result.innerHTML = "<p>❌ Connection lost.</p>";
        source.close();
    }

    source.onmessage = onMessage;
    source.onerror = onError;
})();
</script>
{% endblock %}
